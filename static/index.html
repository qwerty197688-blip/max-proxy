<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌸 Florcat Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #scorePanel { position: absolute; top: 20px; left: 20px; background: rgba(255,240,245,0.8); backdrop-filter: blur(5px); border-radius: 15px; padding: 8px 16px; font-family: 'Arial', sans-serif; color: #4a3040; font-size: 20px; }
        #gameOverPanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,245,240,0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; text-align: center; display: none; }
        #gameOverPanel h2 { color: #e07a96; margin: 0 0 20px 0; }
        #gameOverPanel button { background: #e07a96; border: none; color: white; padding: 12px 30px; border-radius: 25px; font-size: 18px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
    <div id="scorePanel">🌸 <span id="scoreText">0</span></div>
    <div id="gameOverPanel">
        <h2>Игра окончена!</h2>
        <p>Ваши очки: <b id="finalScore">0</b> 🌸</p>
        <button onclick="restartGame()">Заново</button>
        <button onclick="exitGame()">Выйти</button>
    </div>
</div>

<script>
// Инициализация
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 390;
canvas.height = 700;

// Загрузка ресурсов
const images = {
    heroRun: loadImage('hero_sprite.png'),
    bgSky: loadImage('bg_sky.png'),
    bgTrees: loadImage('bg_trees.png'),
    bgGround: loadImage('bg_ground.png'),
    obstacles: [
        loadImage('obstacle_rock.png'),
        loadImage('obstacle_thorns.png'),
        loadImage('obstacle_cart.png')
    ],
    flowers: [
        loadImage('flower_peony.png'),
        loadImage('flower_lotus.png'),
        loadImage('flower_daisy.png')
    ],
    uiPanel: loadImage('ui_panel.png'),
    gameOverPanel: loadImage('game_over_panel.png')
};

// Переменные
let player = { x: 80, y: 0, width: 80, height: 96, dy: 0, jumpPower: -12, gravity: 0.6, isJumping: false, frame: 0 };
let obstacles = [];
let flowers = [];
let score = 0;
let gameSpeed = 4;
let gameRunning = true;
let frameCount = 0;

// Загрузка изображения
function loadImage(src) {
    const img = new Image();
    img.src = `/static/${src}`;
    return img;
}

// Прыжок
function jump() {
    if (!player.isJumping && gameRunning) {
        player.dy = player.jumpPower;
        player.isJumping = true;
    }
}

// Слушатели
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
document.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });

// Игровой цикл
function update() {
    if (!gameRunning) return;

    frameCount++;
    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y >= canvas.height - 160) {
        player.y = canvas.height - 160;
        player.isJumping = false;
        player.frame = (Math.floor(frameCount/5) % 6);
    } else {
        player.frame = 6; // кадр прыжка
    }

    if (Math.random() < 0.02) spawnObstacle();
    if (Math.random() < 0.015) spawnFlower();

    for (let i = obstacles.length-1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;
        if (checkCollision(player, obstacles[i])) { gameRunning = false; endGame(); }
        if (obstacles[i].x < -100) obstacles.splice(i,1);
    }

    for (let i = flowers.length-1; i >= 0; i--) {
        flowers[i].x -= gameSpeed;
        if (checkCollision(player, flowers[i])) { score += 10; flowers.splice(i,1); }
        if (flowers[i] && flowers[i].x < -50) flowers.splice(i,1);
    }

    gameSpeed += 0.002;
    document.getElementById('scoreText').textContent = score;
}

function spawnObstacle() {
    const type = Math.floor(Math.random() * 3);
    obstacles.push({ x: canvas.width, y: canvas.height - 190, width: 90, height: 80, type });
}

function spawnFlower() {
    const type = Math.floor(Math.random() * 3);
    flowers.push({ x: canvas.width + Math.random() * 100, y: canvas.height - 250 - Math.random() * 100, width: 60, height: 60, type });
}

function checkCollision(a, b) {
    return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
}

// Отрисовка
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Параллакс-фон
    const bgOffset = (frameCount * gameSpeed * 0.1) % canvas.width;
    ctx.drawImage(images.bgSky, -bgOffset, 0, canvas.width, canvas.height);
    ctx.drawImage(images.bgSky, canvas.width - bgOffset, 0, canvas.width, canvas.height);
    ctx.drawImage(images.bgTrees, -bgOffset * 1.5, 0, canvas.width, canvas.height);
    ctx.drawImage(images.bgTrees, canvas.width - bgOffset * 1.5, 0, canvas.width, canvas.height);

    // Земля
    ctx.drawImage(images.bgGround, -bgOffset * 2, canvas.height - 100, canvas.width, 100);
    ctx.drawImage(images.bgGround, canvas.width - bgOffset * 2, canvas.height - 100, canvas.width, 100);

    // Игрок
    const heroImg = images.heroRun;
    const frameWidth = heroImg.width / 7; // 6 беговых + 1 прыжок
    ctx.drawImage(heroImg, player.frame * frameWidth, 0, frameWidth, heroImg.height, player.x, player.y, player.width, player.height);

    // Препятствия
    for (const obs of obstacles) {
        const img = images.obstacles[obs.type];
        ctx.drawImage(img, obs.x, obs.y, obs.width, obs.height);
    }

    // Цветы
    for (const fl of flowers) {
        const img = images.flowers[fl.type];
        ctx.drawImage(img, fl.x, fl.y, fl.width, fl.height);
    }
}

function endGame() {
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOverPanel').style.display = 'block';
    // Отправка результата в бота через Telegram WebApp API
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.sendData(JSON.stringify({ action: 'game_over', score }));
    }
}

function restartGame() {
    obstacles = [];
    flowers = [];
    score = 0;
    gameSpeed = 4;
    player.y = canvas.height - 160;
    player.dy = 0;
    gameRunning = true;
    document.getElementById('gameOverPanel').style.display = 'none';
}

function exitGame() {
    if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.close();
}

// Главный цикл
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
